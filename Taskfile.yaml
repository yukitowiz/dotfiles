version: "3"

vars:
  ROOT: "{{.TASKFILE_DIR}}"
  CI_CONFIG: "{{.TASKFILE_DIR}}/tests/chezmoi-ci.toml"
  TEST_DEST: "{{.TASKFILE_DIR}}/.tmp/chezmoi-dest"

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  diff:
    desc: Show differences between chezmoi source and destination
    cmds:
      - chezmoi diff

  dry-run:
    desc: Run chezmoi apply in dry-run mode
    cmds:
      - chezmoi apply --dry-run --verbose

  apply:
    desc: Apply dotfiles
    cmds:
      - chezmoi apply

  update:
    desc: Pull and apply latest dotfiles
    cmds:
      - chezmoi update

  status:
    desc: Show chezmoi status
    cmds:
      - chezmoi status

  doctor:
    desc: Run diagnostics
    cmds:
      - chezmoi doctor
      - chezmoi status

  cd:
    desc: Print chezmoi source directory
    cmds:
      - chezmoi source-path

  prepare-test-dest:
    desc: Prepare temporary destination directory for tests
    cmds:
      - cmd: mkdir -p "{{.TEST_DEST}}"
        platforms: [linux, darwin]
      - cmd: powershell -NoProfile -ExecutionPolicy Bypass -Command "New-Item -ItemType Directory -Force -Path '{{.TEST_DEST}}' | Out-Null"
        platforms: [windows]

  clean:
    desc: Remove temporary test files
    cmds:
      - cmd: rm -rf "{{.ROOT}}/.tmp"
        platforms: [linux, darwin]
      - cmd: powershell -NoProfile -ExecutionPolicy Bypass -Command "Remove-Item -Recurse -Force '{{.ROOT}}/.tmp' -ErrorAction SilentlyContinue"
        platforms: [windows]

  render:
    desc: Render chezmoi templates with CI config
    deps:
      - prepare-test-dest
    cmds:
      - >
        chezmoi
        --source="{{.ROOT}}"
        --destination="{{.TEST_DEST}}"
        --config="{{.CI_CONFIG}}"
        apply
        --dry-run
        --verbose

  test:
    desc: Run cross-platform tests
    cmds:
      - task: render
      - task: lint-shell

  lint-shell:
    desc: Run shellcheck where available
    cmds:
      - cmd: |
          if command -v shellcheck >/dev/null 2>&1; then
            find "{{.ROOT}}" -type f \( -name "*.sh" -o -name "*.sh.tmpl" \) -print | while read -r file; do
              echo "Checking $file"
              shellcheck "$file" || exit 1
            done
          else
            echo "shellcheck not found. Skipping."
          fi
        platforms: [linux, darwin]
      - cmd: powershell -NoProfile -ExecutionPolicy Bypass -Command "Write-Host 'Skipping shellcheck on Windows.'"
        platforms: [windows]

  inventory:
    desc: List existing local dotfile candidates
    cmds:
      - cmd: sh "{{.ROOT}}/scripts/inventory.sh"
        platforms: [linux, darwin]
      - cmd: powershell -NoProfile -ExecutionPolicy Bypass -File "{{.ROOT}}/scripts/inventory.ps1"
        platforms: [windows]

  office:install:
    desc: Clone or update office-only SSH config repository
    cmds:
      - cmd: |
          if [ -z "${DOTFILES_OFFICE_REPO:-}" ]; then
            echo "DOTFILES_OFFICE_REPO is not set."
            echo "Example:"
            echo "  export DOTFILES_OFFICE_REPO=git@github.com-work:<ORG>/dotfiles-office-ssh.git"
            exit 1
          fi

          mkdir -p "$HOME/.ssh/config.d"

          if [ -d "$HOME/.ssh/config.d/office/.git" ]; then
            git -C "$HOME/.ssh/config.d/office" pull --ff-only
          else
            git clone --depth 1 "$DOTFILES_OFFICE_REPO" "$HOME/.ssh/config.d/office"
          fi

          chmod 700 "$HOME/.ssh" || true
          chmod 700 "$HOME/.ssh/config.d" || true
          chmod 700 "$HOME/.ssh/config.d/office" || true
          find "$HOME/.ssh/config.d/office" -type f -name "*.conf" -exec chmod 600 {} \; || true
        platforms: [linux, darwin]

      - cmd: |
          if "%DOTFILES_OFFICE_REPO%"=="" (
            echo DOTFILES_OFFICE_REPO is not set.
            echo Example:
            echo   set DOTFILES_OFFICE_REPO=git@github.com-work:^<ORG^>/dotfiles-office-ssh.git
            exit /b 1
          )

          if not exist "%USERPROFILE%\.ssh\config.d" mkdir "%USERPROFILE%\.ssh\config.d"

          if exist "%USERPROFILE%\.ssh\config.d\office\.git" (
            git -C "%USERPROFILE%\.ssh\config.d\office" pull --ff-only
          ) else (
            git clone --depth 1 "%DOTFILES_OFFICE_REPO%" "%USERPROFILE%\.ssh\config.d\office"
          )
        platforms: [windows]

  office:update:
    desc: Update office-only SSH config repository
    cmds:
      - task: office:install

  office:status:
    desc: Show office-only SSH config repository status
    cmds:
      - cmd: |
          if [ -d "$HOME/.ssh/config.d/office/.git" ]; then
            git -C "$HOME/.ssh/config.d/office" status --short --branch
          else
            echo "Office SSH config repository is not installed."
          fi
        platforms: [linux, darwin]

      - cmd: |
          if exist "%USERPROFILE%\.ssh\config.d\office\.git" (
            git -C "%USERPROFILE%\.ssh\config.d\office" status --short --branch
          ) else (
            echo Office SSH config repository is not installed.
          )
        platforms: [windows]

  office:remove:
    desc: Remove office-only SSH config repository
    cmds:
      - cmd: |
          rm -rf "$HOME/.ssh/config.d/office"
        platforms: [linux, darwin]

      - cmd: |
          if exist "%USERPROFILE%\.ssh\config.d\office" rmdir /s /q "%USERPROFILE%\.ssh\config.d\office"
        platforms: [windows]
