version: "3"

vars:
  ROOT: "{{.TASKFILE_DIR}}"
  CI_CONFIG: "{{.TASKFILE_DIR}}/tests/chezmoi-ci.toml"
  TEST_DEST: "{{.TASKFILE_DIR}}/.tmp/chezmoi-dest"

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  diff:
    desc: Show differences between chezmoi source and destination
    cmds:
      - chezmoi diff

  dry-run:
    desc: Run chezmoi apply in dry-run mode
    cmds:
      - chezmoi apply --dry-run --verbose

  apply:
    desc: Apply dotfiles
    cmds:
      - chezmoi apply

  update:
    desc: Pull and apply latest dotfiles
    cmds:
      - chezmoi update

  status:
    desc: Show chezmoi status
    cmds:
      - chezmoi status

  doctor:
    desc: Run diagnostics
    cmds:
      - chezmoi doctor
      - chezmoi status

  cd:
    desc: Print chezmoi source directory
    cmds:
      - chezmoi source-path

  prepare-test-dest:
    desc: Prepare temporary destination directory for tests
    cmds:
      - cmd: mkdir -p "{{.TEST_DEST}}"
        platforms: [linux, darwin]
      - cmd: powershell -NoProfile -ExecutionPolicy Bypass -Command "New-Item -ItemType Directory -Force -Path '{{.TEST_DEST}}' | Out-Null"
        platforms: [windows]

  clean:
    desc: Remove temporary test files
    cmds:
      - cmd: rm -rf "{{.ROOT}}/.tmp"
        platforms: [linux, darwin]
      - cmd: powershell -NoProfile -ExecutionPolicy Bypass -Command "Remove-Item -Recurse -Force '{{.ROOT}}/.tmp' -ErrorAction SilentlyContinue"
        platforms: [windows]

  render:
    desc: Render chezmoi templates with CI config
    deps:
      - prepare-test-dest
    cmds:
      - >
        chezmoi
        --source="{{.ROOT}}"
        --destination="{{.TEST_DEST}}"
        --config="{{.CI_CONFIG}}"
        apply
        --dry-run
        --verbose

  test:
    desc: Run cross-platform tests
    cmds:
      - task: render
      - task: lint-shell

  lint-shell:
    desc: Run shellcheck where available
    cmds:
      - cmd: |
          if command -v shellcheck >/dev/null 2>&1; then
            find "{{.ROOT}}" -type f \( -name "*.sh" -o -name "*.sh.tmpl" \) -print | while read -r file; do
              echo "Checking $file"
              shellcheck "$file" || exit 1
            done
          else
            echo "shellcheck not found. Skipping."
          fi
        platforms: [linux, darwin]
      - cmd: powershell -NoProfile -ExecutionPolicy Bypass -Command "Write-Host 'Skipping shellcheck on Windows.'"
        platforms: [windows]

  inventory:
    desc: List existing local dotfile candidates
    cmds:
      - cmd: sh "{{.ROOT}}/scripts/inventory.sh"
        platforms: [linux, darwin]
      - cmd: powershell -NoProfile -ExecutionPolicy Bypass -File "{{.ROOT}}/scripts/inventory.ps1"
        platforms: [windows]

  office:install:
    desc: Install or update office-only SSH config from a separate repository
    cmds:
      - cmd: |
          if [ -z "${DOTFILES_OFFICE_REPO:-}" ]; then
            echo "DOTFILES_OFFICE_REPO is not set."
            echo
            echo "Example:"
            echo "  export DOTFILES_OFFICE_REPO=git@githubw.com:<ORG>/dotfiles-office.git"
            exit 1
          fi

          OFFICE_CACHE_DIR="$HOME/.local/share/dotfiles-office"
          OFFICE_SSH_CONFIG_SRC="ssh/office.conf"
          OFFICE_SSH_CONFIG_DEST="$HOME/.ssh/config.d/office.conf"

          mkdir -p "$HOME/.ssh/config.d"
          mkdir -p "$HOME/.ssh/controlmasters"

          if [ -d "$OFFICE_CACHE_DIR/.git" ]; then
            git -C "$OFFICE_CACHE_DIR" fetch --prune
            git -C "$OFFICE_CACHE_DIR" pull --ff-only
          else
            git clone --filter=blob:none --sparse "$DOTFILES_OFFICE_REPO" "$OFFICE_CACHE_DIR"
            git -C "$OFFICE_CACHE_DIR" sparse-checkout set "$OFFICE_SSH_CONFIG_SRC"
          fi

          cp "$OFFICE_CACHE_DIR/$OFFICE_SSH_CONFIG_SRC" "$OFFICE_SSH_CONFIG_DEST"

          chmod 700 "$HOME/.ssh" || true
          chmod 700 "$HOME/.ssh/config.d" || true
          chmod 700 "$HOME/.ssh/controlmasters" || true
          chmod 600 "$OFFICE_SSH_CONFIG_DEST" || true

          echo "Installed: $OFFICE_SSH_CONFIG_DEST"
        platforms: [linux, darwin]

      - cmd: |
          if (-not $env:DOTFILES_OFFICE_REPO) {
            Write-Host "DOTFILES_OFFICE_REPO is not set."
            Write-Host ""
            Write-Host "Example:"
            Write-Host '$env:DOTFILES_OFFICE_REPO = "git@githubw.com:<ORG>/dotfiles-office.git"'
            exit 1
          }

          $OfficeCacheDir = Join-Path $HOME ".local/share/dotfiles-office"
          $OfficeSshConfigSrc = "ssh/office.conf"
          $OfficeSshConfigDestDir = Join-Path $HOME ".ssh/config.d"
          $OfficeSshConfigDest = Join-Path $OfficeSshConfigDestDir "office.conf"

          New-Item -ItemType Directory -Force -Path $OfficeSshConfigDestDir | Out-Null

          if (Test-Path (Join-Path $OfficeCacheDir ".git")) {
            git -C $OfficeCacheDir fetch --prune
            git -C $OfficeCacheDir pull --ff-only
          } else {
            git clone --filter=blob:none --sparse $env:DOTFILES_OFFICE_REPO $OfficeCacheDir
            git -C $OfficeCacheDir sparse-checkout set $OfficeSshConfigSrc
          }

          Copy-Item -Force `
            -Path (Join-Path $OfficeCacheDir $OfficeSshConfigSrc) `
            -Destination $OfficeSshConfigDest

          Write-Host "Installed: $OfficeSshConfigDest"
        platforms: [windows]

  office:update:
    desc: Update office-only SSH config
    cmds:
      - task: office:install

  office:status:
    desc: Show office-only repository status
    cmds:
      - cmd: |
          OFFICE_CACHE_DIR="$HOME/.local/share/dotfiles-office"

          if [ -d "$OFFICE_CACHE_DIR/.git" ]; then
            git -C "$OFFICE_CACHE_DIR" status --short --branch
          else
            echo "Office repository is not installed."
          fi
        platforms: [linux, darwin]

      - cmd: |
          $OfficeCacheDir = Join-Path $HOME ".local/share/dotfiles-office"

          if (Test-Path (Join-Path $OfficeCacheDir ".git")) {
            git -C $OfficeCacheDir status --short --branch
          } else {
            Write-Host "Office repository is not installed."
          }
        platforms: [windows]

  office:remove:
    desc: Remove installed office-only SSH config and cached repository
    cmds:
      - cmd: |
          rm -f "$HOME/.ssh/config.d/office.conf"
          rm -rf "$HOME/.local/share/dotfiles-office"
        platforms: [linux, darwin]

      - cmd: |
          $OfficeCacheDir = Join-Path $HOME ".local/share/dotfiles-office"
          $OfficeSshConfig = Join-Path $HOME ".ssh/config.d/office.conf"

          Remove-Item -Force $OfficeSshConfig -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force $OfficeCacheDir -ErrorAction SilentlyContinue
        platforms: [windows]
